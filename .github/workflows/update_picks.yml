name: PAD Pick Tracker Daily Update

on:
  schedule:
    - cron: '35 21 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run tracker
        run: python update_picks.py

      - name: Commit picks_data.json
        run: |
          git config user.name "PAD Tracker Bot"
          git config user.email "bot@pivotalphadesk.com"
          git add picks_data.json
          git diff --staged --quiet || git commit -m "update picks data"
          git push
