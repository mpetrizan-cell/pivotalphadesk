<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact — PivotAlphaDesk</title>

<style>

body{
background:#0b1117;
font-family:Arial;
color:#e6edf3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:520px;
background:#111a23;
padding:40px;
border-radius:12px;
border:1px solid #1e2a36;
}

h1{
margin-top:0;
color:#f5b83d;
}

p{
color:#9fb3c8;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #2c3c4d;
background:#0b1117;
color:white;
}

button{
margin-top:15px;
padding:12px;
background:#00c8ff;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h1>Contact PivotAlphaDesk</h1>

<p>Research inquiries, collaboration or institutional access.</p>

<form action="https://formspree.io/f/mqeyywdk" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" rows="6" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</body>

</html>
